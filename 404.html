    <script>
        window.speak = (text) => {
            const voices = window.speechSynthesis.getVoices();
            // if (voices.length === 0) {
            //     console.warn("Speech Synthesis failed: No voices detected.");
            //     // If we haven't alerted yet in this session to avoid spamming
            //     if (!window.speechWarned) {
            //         alert("No text-to-speech voices found! If you are using Brave, try turning off 'Strict Fingerprinting Protection' in Shields. On Manjaro/Linux, you may need to install 'speech-dispatcher' and a voice engine like 'espeak' or 'festival'.");
            //         window.speechWarned = true;
            //     }
            // }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0; // Normal rate instead of fast

            if (voices.length > 0) {
                // Try to find an English voice, otherwise use the default first voice
                utterance.voice = voices.find(v => v.lang.startsWith('en')) || voices[0];
            }

            window.speechSynthesis.speak(utterance);
        };
