<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StrikeFlow</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="StrikeFlow.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        window.speak = (text) => {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                console.warn("Speech Synthesis failed: No voices detected.");
                // If we haven't alerted yet in this session to avoid spamming
                if (!window.speechWarned) {
                    alert("No text-to-speech voices found! If you are using Brave, try turning off 'Strict Fingerprinting Protection' in Shields. On Manjaro/Linux, you may need to install 'speech-dispatcher' and a voice engine like 'espeak' or 'festival'.");
                    window.speechWarned = true;
                }
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0; // Normal rate instead of fast

            if (voices.length > 0) {
                // Try to find an English voice, otherwise use the default first voice
                utterance.voice = voices.find(v => v.lang.startsWith('en')) || voices[0];
            }

            window.speechSynthesis.speak(utterance);
        };
    </script>
</body>

</html>
